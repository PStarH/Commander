# =============================================================================
# Commander — Production Docker Compose Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        - NODE_ENV=production
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    # Production logging — structured JSON to stdout
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    # Restart more aggressively
    restart: always
    # Production env overrides
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - CORS_ORIGINS=${CORS_ORIGINS:-https://app.commander.com}
      - COMMANDER_API_KEY=${COMMANDER_API_KEY:?err}
      # Required production secrets. Set these in .env before deploying.
      - COMMANDER_MASTER_KEY=${COMMANDER_MASTER_KEY:?err}
      - JWT_SECRET=${JWT_SECRET:?err}
      # Rate limiting
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      # Multi-tenant settings
      - TENANT_PROVIDER=${TENANT_PROVIDER:-simple}
      - TENANT_CONFIG_PATH=${TENANT_CONFIG_PATH:-/app/config/tenants.json}
      # Production database: PostgreSQL is the default for multi-replica deployments
      - API_STORE_BACKEND=${API_STORE_BACKEND:-postgres}
      - DATABASE_URL=${DATABASE_URL:-postgres://commander:${POSTGRES_PASSWORD:?err}@postgres:5432/commander}
      # Architecture V2: production API refuses to start without kernel (apps/api).
      - COMMANDER_KERNEL_ENABLED=${COMMANDER_KERNEL_ENABLED:-1}
      - COMMANDER_KERNEL_DATABASE_URL=${COMMANDER_KERNEL_DATABASE_URL:-${DATABASE_URL:-postgres://commander:${POSTGRES_PASSWORD:?err}@postgres:5432/commander}}
      - COMMANDER_DEFAULT_POLICY_SNAPSHOT_ID=${COMMANDER_DEFAULT_POLICY_SNAPSHOT_ID:-policy-default-v1}
      - COMMANDER_DEFAULT_TENANT_ID=${COMMANDER_DEFAULT_TENANT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - commander_state:/app/.commander_state
      - commander_traces:/app/.commander_traces
      - commander_memory:/app/.commander_memory
      - commander_results:/app/.commander_results
      - ./config:/app/config:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: commander-postgres
    # SECURITY: never publish 5432 on the host in production — compose-network only.
    # Do not add `ports:` here. Local debugging: bind "127.0.0.1:5432:5432" temporarily.
    expose:
      - '5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-commander}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-commander}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-commander} -d ${POSTGRES_DB:-commander}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

volumes:
  commander_state:
    driver: local
  commander_traces:
    driver: local
  commander_memory:
    driver: local
  commander_results:
    driver: local
  postgres-data:
    driver: local
