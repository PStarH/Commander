# =============================================================================
# Commander — Docker Compose
# One-command deployment: docker compose up
#
# Optional add-on stacks (started only when their profile is requested):
#   docker compose --profile distributed up      # Redis for distributed EventBus
#   docker compose --profile observability up    # Prometheus + Grafana
#   docker compose --profile tracing up          # Jaeger (OTLP traces)
#   docker compose --profile distributed --profile observability up
# =============================================================================
# Local-first design: the default `docker compose up` runs ONLY api + web with
# in-memory EventBus. Distributed/observability services are opt-in so single-box
# deployments stay lightweight (no Redis/Prometheus overhead unless requested).
# =============================================================================

services:
  # API server — War Room backend + Commander execution engine
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        - NODE_ENV=production
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      # Security: Require API key to be set. Fail fast if missing.
      - 'COMMANDER_API_KEY=${COMMANDER_API_KEY:?COMMANDER_API_KEY is required. Generate one with: openssl rand -hex 32}'
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      # Distributed EventBus — defaults to in-memory (local-first). Set to
      # `redis` + provide COMMANDER_EVENT_BUS_REDIS_URL to enable cross-node
      # fan-out. When the `distributed` profile is active, the `redis` service
      # below provides the URL automatically.
      - COMMANDER_EVENT_BUS_BACKEND=${COMMANDER_EVENT_BUS_BACKEND:-memory}
      - COMMANDER_EVENT_BUS_REDIS_URL=${COMMANDER_EVENT_BUS_REDIS_URL:-redis://redis:6379}
      # OTLP exporter — points at the `otel-collector`/`jaeger` service when the
      # tracing profile is active. No-op when OTEL_EXPORTER_OTLP_ENDPOINT is unset.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Database backend: sqlite (default) | postgres. When postgres is selected,
      # DATABASE_URL must point at a running PostgreSQL instance (see `database` profile).
      - API_STORE_BACKEND=${API_STORE_BACKEND:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-}
      # Architecture V2 shared execution kernel (Postgres-backed)
      - COMMANDER_KERNEL_ENABLED=${COMMANDER_KERNEL_ENABLED:-0}
      - COMMANDER_KERNEL_DATABASE_URL=${COMMANDER_KERNEL_DATABASE_URL:-${DATABASE_URL:-}}
      # -------------------------------------------------------------------------
      # SECURITY: The values below are DEV-ONLY defaults. They let you run
      # `docker compose up` locally without creating a .env file first. They are
      # NOT safe for production and will be rejected by validateEnvironment() if
      # you forget to override them via .env or docker-compose.prod.yml.
      # -------------------------------------------------------------------------
      - COMMANDER_MASTER_KEY=${COMMANDER_MASTER_KEY:-dev-master-key-change-me-in-production}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-me-in-production}
      # CORS origins — comma-separated. NEVER use '*' in production.
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - commander_state:/app/.commander_state
      - commander_traces:/app/.commander_traces
      - commander_memory:/app/.commander_memory
      - commander_results:/app/.commander_results
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Worker — executes durable kernel steps ───────────────────────────────
  # Started only with: docker compose --profile worker up
  # Requires COMMANDER_KERNEL_ENABLED=1 and a Postgres kernel database.
  worker:
    build:
      context: .
      dockerfile: packages/worker-plane/Dockerfile
      args:
        - NODE_ENV=production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
      - COMMANDER_WORKER_BOOTSTRAP=/app/packages/worker-plane/dist/bootstrap.js
      - COMMANDER_WORKER_AUTH_TOKEN=${COMMANDER_WORKER_AUTH_TOKEN:-worker-token}
      - COMMANDER_WORKER_AUTH_SUBJECT=${COMMANDER_WORKER_AUTH_SUBJECT:-worker}
      - COMMANDER_WORKER_CAPABILITIES=${COMMANDER_WORKER_CAPABILITIES:-agent,tool,connector}
      - COMMANDER_WORKER_MAX_CONCURRENCY=${COMMANDER_WORKER_MAX_CONCURRENCY:-10}
      - COMMANDER_WORKER_TENANTS=${COMMANDER_WORKER_TENANTS:-*}
      - COMMANDER_WORKER_LEASE_TTL_MS=${COMMANDER_WORKER_LEASE_TTL_MS:-30000}
      - COMMANDER_WORKER_HEARTBEAT_MS=${COMMANDER_WORKER_HEARTBEAT_MS:-10000}
      - COMMANDER_WORKER_POLL_MS=${COMMANDER_WORKER_POLL_MS:-250}
      - COMMANDER_EFFECT_BROKER_SEED=${COMMANDER_EFFECT_BROKER_SEED:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker

  # ── Timer Wakeup Worker — drives retry/deadline state transitions ────────
  # Started only with: docker compose --profile worker up
  timer:
    build:
      context: .
      dockerfile: packages/operations/Dockerfile
      args:
        - NODE_ENV=production
        - OPERATIONS_MODE=timer
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker

  # ── Outbox Publisher — at-least-once event delivery ────────────────────────
  # Started only with: docker compose --profile worker up
  outbox:
    build:
      context: .
      dockerfile: packages/operations/Dockerfile
      args:
        - NODE_ENV=production
        - OPERATIONS_MODE=outbox
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker

  # Web GUI — Agent War Room dashboard
  web:
    build:
      context: .
      target: web
    ports:
      - '3000:80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL — production database backend (opt-in) ──────────────────
  # Started only with: docker compose --profile database up
  # Enables persistent, multi-replica-safe storage for the API state store.
  # Set API_STORE_BACKEND=postgres and DATABASE_URL=postgres://commander:commander@postgres:5432/commander
  postgres:
    image: postgres:16-alpine
    container_name: commander-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-commander}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-commander}
      - POSTGRES_DB=${POSTGRES_DB:-commander}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-commander} -d ${POSTGRES_DB:-commander}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - database

  # ── Redis — distributed EventBus backend (opt-in) ──────────────────────
  # Started only with: docker compose --profile distributed up
  # Enables cross-node pub/sub for DistributedEventBus (BackendType='redis').
  # Memory-only single-box deployments do not need this service.
  redis:
    image: redis:7-alpine
    container_name: commander-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    profiles:
      - distributed

  # ── Prometheus — metrics scraping (opt-in) ─────────────────────────────
  # Started only with: docker compose --profile observability up
  # Scrapes the api /metrics endpoint. Uses prometheus.compose.yml which
  # targets `api:4000` (service name) instead of host.docker.internal.
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: commander-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./deploy/observability/prometheus/prometheus.compose.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9090/-/healthy']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - observability

  # ── Grafana — pre-configured dashboards (opt-in) ───────────────────────────
  # Started only with: docker compose --profile observability up
  grafana:
    image: grafana/grafana:10.4.0
    container_name: commander-grafana
    ports:
      - '3001:3000'
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/developer-overview.json
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    profiles:
      - observability

  # ── Jaeger — OTLP trace receiver (opt-in) ──────────────────────────────────
  # Started only with: docker compose --profile tracing up
  # Point Commander at it via OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: commander-jaeger
    ports:
      - '16686:16686' # UI
      - '4318:4318' # OTLP HTTP
      - '4317:4317' # OTLP gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:14269/']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - tracing

volumes:
  commander_state:
  commander_traces:
  commander_memory:
  commander_results:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
