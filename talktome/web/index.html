<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkToMe - 与另一个自己对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 200px); }
        .message-user { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .message-assistant { background: #f3f4f6; }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto max-w-4xl p-4">
        <!-- Header -->
        <header class="bg-white rounded-lg shadow-sm p-4 mb-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">🌳 TalkToMe</h1>
                    <p class="text-sm text-gray-500">你正在和基于你自己的数据训练的分身聊天</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="showImport()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
                        导入数据
                    </button>
                    <button onclick="clearHistory()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        清空对话
                    </button>
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="bg-white rounded-lg shadow-sm mb-4">
            <div id="chatContainer" class="chat-container overflow-y-auto p-4 space-y-4">
                <!-- Messages will be inserted here -->
                <div class="text-center text-gray-400 py-8">
                    <p class="text-lg mb-2">👋 欢迎来到 TalkToMe</p>
                    <p class="text-sm">发送一条消息开始对话</p>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="border-t p-4">
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="说点什么..." 
                        class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        onkeypress="if(event.key==='Enter')sendMessage()"
                    />
                    <button 
                        onclick="sendMessage()" 
                        class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition"
                    >
                        发送
                    </button>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="bg-white rounded-lg shadow-sm p-3">
            <div class="flex items-center justify-between text-sm text-gray-500">
                <span id="statusText">就绪</span>
                <span id="memoryCount">已加载记忆: 0 条</span>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h2 class="text-xl font-bold mb-4">导入数据</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">数据源类型</label>
                    <select id="sourceType" class="w-full border rounded-lg p-2">
                        <option value="telegram">Telegram 导出 (JSON)</option>
                        <option value="twitter">Twitter 数据包</option>
                        <option value="local">本地文件 (TXT/MD/JSON)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">文件路径</label>
                    <input type="text" id="filePath" placeholder="/path/to/file.json" class="w-full border rounded-lg p-2" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">数据源名称</label>
                    <input type="text" id="sourceName" placeholder="我的 Telegram 聊天" class="w-full border rounded-lg p-2" />
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="doImport()" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        导入
                    </button>
                    <button onclick="hideImport()" class="flex-1 px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:3838';
        let conversationId = null;

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            addMessage(message, 'user');
            showTyping();

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId
                    })
                });

                const data = await response.json();
                conversationId = data.conversation_id;
                hideTyping();
                addMessage(data.response, 'assistant', data.relevant_memories);
            } catch (error) {
                hideTyping();
                addMessage('连接失败，请确保 TalkToMe 服务正在运行', 'error');
            }
        }

        function addMessage(text, type, memories = null) {
            const container = document.getElementById('chatContainer');
            
            // Clear welcome message if first message
            if (container.querySelector('.text-center')) {
                container.innerHTML = '';
            }

            const wrapper = document.createElement('div');
            wrapper.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-xs md:max-w-md lg:max-w-lg px-4 py-2 rounded-lg ${
                type === 'user' 
                    ? 'message-user text-white' 
                    : type === 'error'
                        ? 'bg-red-100 text-red-700'
                        : 'message-assistant text-gray-800'
            }`;
            bubble.innerHTML = `<p class="whitespace-pre-wrap">${escapeHtml(text)}</p>`;
            
            if (memories && memories.length > 0) {
                const memoriesDiv = document.createElement('div');
                memoriesDiv.className = 'mt-2 pt-2 border-t border-gray-200 text-xs text-gray-500';
                memoriesDiv.innerHTML = `<span class="font-medium">相关记忆:</span> ${memories.length} 条`;
                bubble.appendChild(memoriesDiv);
            }

            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'flex justify-start';
            typing.innerHTML = `
                <div class="bg-gray-100 px-4 py-2 rounded-lg">
                    <div class="typing-indicator flex gap-1">
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                    </div>
                </div>
            `;
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showImport() {
            document.getElementById('importModal').classList.remove('hidden');
        }

        function hideImport() {
            document.getElementById('importModal').classList.add('hidden');
        }

        async function doImport() {
            const type = document.getElementById('sourceType').value;
            const path = document.getElementById('filePath').value;
            const name = document.getElementById('sourceName').value;

            if (!path || !name) {
                alert('请填写完整信息');
                return;
            }

            document.getElementById('statusText').textContent = '导入中...';

            try {
                // 使用 CLI 命令导入（需要后端支持）
                alert(`导入功能需要通过 CLI 运行:\n\ntalktome import-json --name "${name}" --path "${path}"`);
                document.getElementById('statusText').textContent = '请使用 CLI 导入数据';
            } catch (error) {
                document.getElementById('statusText').textContent = '导入失败';
            }

            hideImport();
        }

        function clearHistory() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <div class="text-center text-gray-400 py-8">
                    <p class="text-lg mb-2">👋 欢迎来到 TalkToMe</p>
                    <p class="text-sm">发送一条消息开始对话</p>
                </div>
            `;
            conversationId = null;
        }

        // Check server status on load
        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    document.getElementById('statusText').textContent = '已连接';
                }
            } catch (error) {
                document.getElementById('statusText').textContent = '未连接 - 请启动服务';
            }
        }

        checkStatus();
    </script>
</body>
</html>
