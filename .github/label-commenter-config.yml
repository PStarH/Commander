# Label Commenter Configuration
# Automatically adds labels and comments to issues/PRs

labels:
  - name: good first issue
    description: Good for newcomers
    color: 7057ff
    comment: |
      This issue is a great starting point for new contributors!
      See [CONTRIBUTING.md](https://github.com/PStarH/Commander/blob/main/CONTRIBUTING.md) for setup instructions.

  - name: help wanted
    description: Extra attention is needed
    color: 008672

  - name: bug
    description: Something isn't working
    color: d73a4a

  - name: enhancement
    description: New feature or request
    color: a2eeef

  - name: documentation
    description: Improvements or additions to documentation
    color: 0075ca

  - name: question
    description: Further information is requested
    color: d876e3
