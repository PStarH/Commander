name: Commander CodeQL

paths-ignore:
  - '**/test/**'
  - '**/tests/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/*.e2e.test.ts'
  - '**/__tests__/**'
  - '**/conformance/**'
  - '**/node_modules/**'
  - '**/dist/**'
  # Inline password must be empty per values.schema.json; secrets via existingSecret.
  - 'deploy/helm/**'
  - 'helm/**'

# Global Express rateLimitMiddleware covers /v1 routes; CodeQL cannot see
# cross-file middleware, so missing-rate-limiting on auth handlers is noise.
query-filters:
  - exclude:
      id: js/missing-rate-limiting
  - exclude:
      id: js/empty-password-in-configuration
  - exclude:
      id: js/polynomial-redos
