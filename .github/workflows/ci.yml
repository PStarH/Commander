name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Quality Gates (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install

      - name: Security audit
        run: npm audit --audit-level=high

      - name: ESLint check (no-console rule)
        run: npx eslint packages/core/src

      - name: Prettier format check
        run: npx prettier --check "packages/core/src/**/*.ts" "apps/api/src/**/*.ts" "apps/web/src/**/*.{ts,tsx}"

      - name: TypeScript check (core)
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      - name: TypeScript check (SDK)
        run: pnpm --filter @commander/sdk typecheck

      - name: Verify core test inventory
        run: pnpm --filter @commander/core test:inventory

      - name: Audit reversibility wiring
        run: pnpm audit:wiring

      - name: Run core tests
        run: pnpm --filter @commander/core test

      - name: Path security tests
        run: pnpm --filter @commander/core test:node:pathsec

      - name: CLI check
        run: cd packages/core && npx tsx src/cli.ts status

      - name: Build core package
        run: cd packages/core && npx tsc -p tsconfig.json

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Verify images exist
        run: |
          docker image ls | grep -E "commander.*api|commander.*web" || echo "Image check skipped for non-compose builds"

  web-gui:
    name: Web GUI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install

      - name: Build web GUI
        run: cd apps/web && npx vite build
        env:
          NODE_ENV: production
