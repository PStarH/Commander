name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Quality Gates (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Rebuild better-sqlite3 native binding (Windows MSVC fallback inline)
        # better-sqlite3 ships prebuilt binaries for most OS × ABI combos
        # but pnpm 9.x's prebuild extraction occasionally fails on warm
        # CI caches, producing 'Could not locate the bindings file
        # ... node-v{N}-... better_sqlite3.node' on Node 20 / 22 runners.
        #
        # On Linux/macOS (github-hosted ubuntu/macos runners), the prebuild
        # revert path is enough — `pnpm rebuild better-sqlite3` re-extracts
        # or source-builds via the bundled clang toolchain.
        #
        # On Windows, source-build needs MSVC active IN THE SAME SHELL as
        # `pnpm rebuild` (env does NOT auto-propagate between separate
        # GitHub Actions steps without `>> $GITHUB_ENV` plumbing). To
        # remove that brittle plumbing dependency, we combine MSVC
        # activation + rebuild into ONE Windows-only step: `cmd //c` sources
        # vcvars64.bat inline and chains the rebuild inside the same child
        # process. prebuild extraction exits early on success and never
        # invokes MSVC; if extraction fails, node-gyp falls back to a
        # source-build using the just-activated MSVC env.
        #
        # vswhere.exe is the canonical way to locate VS on Windows GitHub
        # runners. It's always on PATH and returns the installation path
        # regardless of which VS version folder name the runner image uses
        # (e.g. "2022" for VS 2022, "18" for VS 2025 Preview).
        continue-on-error: true
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # ---- Diagnostics: dump what's available on the runner ----
            echo "--- VS diagnostics ---"
            echo "  where cl.exe: $(cmd //c 'where cl.exe 2>nul' 2>/dev/null || echo NOT_FOUND)"
            echo "  where vswhere: $(cmd //c 'where vswhere 2>nul' 2>/dev/null || echo NOT_FOUND)"
            echo "  ls 'Program Files/Microsoft Visual Studio/': $(ls '/c/Program Files/Microsoft Visual Studio/' 2>/dev/null || echo NOT_FOUND)"
            echo "  ls 'Program Files (x86)/Microsoft Visual Studio/': $(ls '/c/Program Files (x86)/Microsoft Visual Studio/' 2>/dev/null || echo NOT_FOUND)"
            echo "  vswhere version: $(cmd //c '"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -version 2>nul' 2>/dev/null || echo NOT_FOUND)"
            echo "  vswhere any products: $(cmd //c '"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath 2>nul' 2>/dev/null || echo NOT_FOUND)"
            # ---- locate vcvars64.bat by trying multiple methods ----
            VS_VCVARS=""
            VS_VCVARS_BASH=""
            # Method A: vswhere (canonical, but needs full path on some runners)
            cmd_vswhere=""
            for candidate in "/c/Program Files (x86)/Microsoft Visual Studio/Installer/vswhere.exe" "/c/Program Files/Microsoft Visual Studio/Installer/vswhere.exe" "vswhere"; do
              if command -v "$candidate" &>/dev/null || [ -f "$candidate" ]; then
                cmd_vswhere="$candidate"
                break
              fi
            done
            if [ -n "$cmd_vswhere" ]; then
              VS_INSTALL_PATH=$("$cmd_vswhere" -latest -products '*' -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath 2>/dev/null | head -1)
              if [ -n "$VS_INSTALL_PATH" ]; then
                echo "  vswhere found VS at: $VS_INSTALL_PATH"
                VS_VCVARS="${VS_INSTALL_PATH}\\VC\\Auxiliary\\Build\\vcvars64.bat"
                VS_VCVARS_BASH=$(echo "$VS_INSTALL_PATH" | sed 's/\\/\//g' | sed 's/^C:/\/c/')"/VC/Auxiliary/Build/vcvars64.bat"
              fi
            fi
            # Method B: find in both possible VS base directories
            if [ -z "$VS_VCVARS" ]; then
              for base in "/c/Program Files/Microsoft Visual Studio" "/c/Program Files (x86)/Microsoft Visual Studio"; do
                if [ -d "$base" ]; then
                  found=$(find "$base" -maxdepth 5 -name "vcvars64.bat" -path "*/VC/Auxiliary/Build/*" 2>/dev/null | head -1)
                  if [ -n "$found" ]; then
                    VS_VCVARS=$(echo "$found" | sed 's|^/c/|C:\\|' | sed 's|/|\\|g')
                    VS_VCVARS_BASH="$found"
                    echo "  find located vcvars64 at: $found"
                    break
                  fi
                fi
              done
            fi
            # Method C: cmd.exe /s dir glob
            if [ -z "$VS_VCVARS" ]; then
              found=$(cmd //c 'dir /s /b "C:\Program Files\Microsoft Visual Studio\*\*\VC\Auxiliary\Build\vcvars64.bat" 2>nul' | head -1)
              if [ -z "$found" ]; then
                found=$(cmd //c 'dir /s /b "C:\Program Files (x86)\Microsoft Visual Studio\*\*\VC\Auxiliary\Build\vcvars64.bat" 2>nul' | head -1)
              fi
              if [ -n "$found" ]; then
                VS_VCVARS="$found"
                VS_VCVARS_BASH=$(echo "$found" | sed 's|\\|/|g' | sed 's|^C:|/c|')
                echo "  cmd dir glob located vcvars64 at: $found"
              fi
            fi
            # ---- Activate MSVC and rebuild ----
            if [ -n "$VS_VCVARS" ]; then
              echo "::notice::Activating MSVC at $VS_VCVARS_BASH, then rebuilding better-sqlite3 in same shell"
              # Resolve the actual better-sqlite3 directory from packages/core's perspective
              BETTER_DIR="$(cd packages/core && node -e "
                var p=require.resolve('better-sqlite3/package.json');
                var d=require('path').dirname(p);
                console.log(d);
              ")"
              echo "  resolved better-sqlite3 dir: [$BETTER_DIR]"
              # Write a batch file to source vcvars64.bat and rebuild better-sqlite3
              batpath="$(pwd)/rebuild.bat"
              echo '@echo on' > "$batpath"
              echo '@call "'"$VS_VCVARS"'"' >> "$batpath"
              echo '@echo [VCVARS_OK]' >> "$batpath"
              echo '@cd /d %GITHUB_WORKSPACE%' >> "$batpath"
              echo '@echo [REMOVE_OLD_BUILD]' >> "$batpath"
              echo '@if exist "'"$BETTER_DIR"'\build" rmdir /s /q "'"$BETTER_DIR"'\build"' >> "$batpath"
              echo '@echo [NODE_GYP_REBUILD]' >> "$batpath"
              echo '@cd /d "'"$BETTER_DIR"'"' >> "$batpath"
              echo '@call npx --yes node-gyp rebuild 2>&1' >> "$batpath"
              echo '@echo [NODE_GYP_EXIT]: %errorlevel%' >> "$batpath"
              echo '@cd /d %GITHUB_WORKSPACE%' >> "$batpath"
              # Convert to Windows path for cmd.exe
              batwin=$(echo "$batpath" | sed 's|^/\([a-z]\)/|\1:\\|' | sed 's|/|\\|g')
              echo "  [BAT] batch file (unix): $batpath"
              echo "  [BAT] batch file (win):  $batwin"
              echo "  [BAT] vcvars64.bat:      $VS_VCVARS"
              echo "  [BAT] workspace:         $GITHUB_WORKSPACE"
              echo "  [BAT] better-sqlite3 dir: $BETTER_DIR"
              echo "  [BAT] displaying batch file:"
              cat "$batpath"
              echo "  [BAT] running..."
              MSYS2_ARG_CONV_EXCL=* cmd /c "$batwin" \
                || (echo "::warning::better-sqlite3 rebuild failed (post-MsVC)")
            else
              echo "::warning::MSVC vcvars64 not located on Windows runner — attempting pnpm rebuild without MSVC source-build fallback"
              pnpm rebuild better-sqlite3 \
                || (echo "::warning::better-sqlite3 rebuild failed" && exit 0)
            fi
          else
            pnpm rebuild better-sqlite3 \
              || (echo "::warning::better-sqlite3 rebuild failed" && exit 0)
          fi
          # Probe: check if compiled binary exists, then try to load binding
          echo "  checking for compiled binary:"
          ls -la packages/core/node_modules/better-sqlite3/build/Release/ 2>/dev/null || echo "  (no build/Release in packages/core)"
          ls -la node_modules/.pnpm/better-sqlite3*/node_modules/better-sqlite3/build/Release/ 2>/dev/null || echo "  (no build/Release in .pnpm store)"
          (cd packages/core && node -e "
            try {
              var D=require('better-sqlite3'), db=new D(':memory:');
              db.exec('CREATE TABLE t (a)');
              var row=db.prepare('SELECT 1 AS v').get();
              db.close();
              process.exit(row&&row.v===1?0:1);
            } catch(e) { console.error('  PROBE_ERROR:', e.message); process.exit(1); }
          ") && echo "::notice::better-sqlite3 binding loaded and functional OK" \
            || echo "::warning::binding did not load post-rebuild"
          echo "::notice::Post-rebuild binding status: ABI=$(node -p 'process.versions.modules') platform=$(node -p 'process.platform') arch=$(node -p 'process.arch')"

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: ESLint check (no-console rule)
        run: pnpm exec eslint packages/core/src

      - name: Prettier format check
        run: pnpm exec prettier --check "packages/core/src/**/*.ts" "apps/api/src/**/*.ts" "apps/web/src/**/*.{ts,tsx}"

      - name: TypeScript check (core)
        run: pnpm --filter @commander/core exec tsc --noEmit

      - name: TypeScript check (SDK)
        run: pnpm --filter @commander/sdk typecheck

      - name: Generate dependency SBOM
        run: pnpm list --recursive --depth=Infinity --json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.os }}-node${{ matrix.node-version }}
          path: sbom.json

      - name: Verify core test inventory
        run: pnpm --filter @commander/core test:inventory

      - name: Audit reversibility wiring
        run: pnpm audit:wiring

      - name: Run core tests
        env:
          COMMANDER_ALLOW_NO_SANDBOX: true
        run: pnpm --filter @commander/core test

      - name: Run SLO measurements
        env:
          COMMANDER_ALLOW_NO_SANDBOX: true
        run: pnpm --filter @commander/core test:slo

      - name: Upload SLO report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slo-report-${{ matrix.os }}-node${{ matrix.node-version }}
          path: packages/core/.commander_benchmarks/slo-report-*.json
          if-no-files-found: ignore

      - name: Print SLO summary
        if: always()
        shell: bash
        run: |
          echo "📊 SLO measurement summary"
          cat packages/core/.commander_benchmarks/slo-report-*.json 2>/dev/null || echo "(no SLO report generated)"

      - name: Path security tests
        env:
          COMMANDER_ALLOW_NO_SANDBOX: true
        run: pnpm --filter @commander/core test:node:pathsec

      - name: CLI check
        run: cd packages/core && npx -p tsx tsx src/cli.ts status

      - name: Build core package
        run: pnpm --filter @commander/core build

      - name: Red Team Smoke Test (security gate)
        run: |
          echo "🔴 Running red team smoke test (5 critical scenarios)..."
          cd packages/core
          npx tsx src/security/runRedTeamBattery.ts --smoke --json > /tmp/rt-smoke.json 2>&1
          EXIT_CODE=$?
          # Parse JSON output for score
          SCORE=$(node -e "try{process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d.trim().split('\\n').find(l=>l.startsWith('{'))||d.trim());console.log(j.securityScore)})}catch(e){console.log(0)}" < /tmp/rt-smoke.json 2>/dev/null || echo "0")
          echo "Red team smoke score: $SCORE/100"
          cat /tmp/rt-smoke.json | tail -20
          # Fail if score < 80 or any critical missed
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Red team smoke test FAILED — security regression detected"
            exit 1
          fi
          echo "✅ Red team smoke test PASSED"
        if: runner.os == 'Linux'

  web-gui:
    name: Web GUI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build web GUI
        run: pnpm exec vite build
        working-directory: apps/web
        env:
          NODE_ENV: production
