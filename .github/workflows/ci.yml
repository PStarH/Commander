name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: TypeScript check
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      - name: Run core tests with coverage
        run: npx tsx --experimental-test-coverage --test packages/core/tests/ultimate-orchestration.test.ts packages/core/tests/hallucinationDetector.test.ts packages/core/tests/commander-tools-integration.test.ts packages/core/tests/advanced-integration.test.ts
        env:
          NODE_V8_COVERAGE: ./coverage

      - name: Check coverage threshold (60%+)
        run: |
          COVERAGE_FILE=$(ls -t packages/core/coverage/*.json 2>/dev/null | head -1)
          if [ -z "$COVERAGE_FILE" ]; then
            echo "No coverage data found — skipping threshold check"
            exit 0
          fi
          COVERAGE=$(node -e "
            const d = require('$COVERAGE_FILE');
            const total = d.result ? d.result.reduce((s, r) => s + r.s, 0) : 0;
            const count = d.result ? d.result.length : 1;
            console.log((total / count).toFixed(1));
          ")
          echo "Average coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets 60% threshold"

      - name: Run benchmarks
        run: npx tsx --test packages/core/benchmarks/ultimate.benchmark.test.ts

      - name: CLI check
        run: npx tsx cli.ts status

      - name: Build core package
        run: cd packages/core && npx tsc -p tsconfig.json

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Verify images exist
        run: |
          docker image ls | grep -E "commander.*api|commander.*web" || echo "Image check skipped for non-compose builds"

  web-gui:
    name: Web GUI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install

      - name: Build web GUI
        run: cd apps/web && npx vite build
        env:
          NODE_ENV: production
