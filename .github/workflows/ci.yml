name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - run: pnpm install

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: TypeScript check (core)
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      - name: TypeScript check (SDK)
        run: pnpm --filter @commander/sdk typecheck

      - name: Run core tests
        run: pnpm --filter @commander/core test

      - name: Run benchmarks
        run: npx tsx --test packages/core/benchmarks/ultimate.benchmark.test.ts

      - name: Benchmark regression check
        run: npx tsx packages/core/benchmarks/ci-benchmark-check.ts
        env:
          CI_BENCHMARK_THRESHOLD: '0.50'
          CI_BENCHMARK_UPDATE: ''

      - name: CLI check
        run: npx tsx cli.ts status

      - name: Build core package
        run: cd packages/core && npx tsc -p tsconfig.json

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Verify images exist
        run: |
          docker image ls | grep -E "commander.*api|commander.*web" || echo "Image check skipped for non-compose builds"

  web-gui:
    name: Web GUI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - run: pnpm install

      - name: Build web GUI
        run: cd apps/web && npx vite build
        env:
          NODE_ENV: production
