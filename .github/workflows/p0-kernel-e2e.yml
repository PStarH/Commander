name: P0 Kernel E2E

# Lightweight gate for Architecture V2 closure work.
# Complements ci.yml kernel-postgres-integration; runs on P0 branches and PRs.

on:
  push:
    branches:
      - 'p0/**'
      - master
      - main
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  p0-kernel-e2e:
    name: P0 Gateway / Kernel / Worker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: commander
          POSTGRES_PASSWORD: commander
          POSTGRES_DB: commander
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U commander -d commander"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://commander:commander@localhost:5432/commander
      COMMANDER_KERNEL_DATABASE_URL: postgres://commander:commander@localhost:5432/commander
      P0_TIMEOUT_MS: '120000'
      GIT_TERMINAL_PROMPT: '0'
      # AgentRuntime side-effects must not require a durable path in CI workers
      COMMANDER_INTERACTION_DB: ':memory:'
      # full-loop uses deterministic worker executor (not full AgentRuntime)
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - name: Build packages
        run: |
          pnpm --filter @commander/contracts build
          pnpm --filter @commander/plugin-sdk build
          pnpm --filter @commander/kernel build
          pnpm --filter @commander/effect-broker build
          pnpm --filter @commander/core build
          pnpm --filter @commander/action-adapters build
          pnpm --filter @commander/worker-plane build
          pnpm --filter @commander/api build
      - name: Kernel PG integration
        run: pnpm exec tsx --test packages/kernel/src/postgres.integration.test.ts
      - name: Worker e2e + reclaim
        run: pnpm exec tsx --test --test-force-exit packages/worker-plane/src/e2e/gateway-kernel-worker.e2e.test.ts
      - name: Full loop to SUCCEEDED
        run: pnpm p0:full-loop
