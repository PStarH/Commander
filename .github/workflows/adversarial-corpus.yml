name: Adversarial Corpus

# ── Weekly Adversarial Corpus Generation ──────────────────────────────
# Generates novel attack payloads via LLM-as-attacker and tests them
# against Commander's defenses. Novel missed attacks are reported via
# the gap discovery issue creator.
#
# Triggers:
#   - Weekly cron (Sunday 02:00 UTC)
#   - Manual workflow_dispatch with optional config
#
# Budget controls (enforced in adversarialAttacker.ts):
#   - maxTokensPerRun: 10,000 tokens
#   - weeklyBudgetUsd: 5.00 USD
#   - maxCorpusSize: 50 variants
# ─────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      maxCorpusSize:
        description: 'Max variants to generate'
        required: false
        default: '50'
      budgetUsd:
        description: 'Weekly budget cap (USD)'
        required: false
        default: '5.00'

jobs:
  adversarial-corpus:
    name: Generate & Test Adversarial Corpus
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build core package
        run: pnpm --filter @commander/core build

      - name: Generate adversarial corpus
        id: generate
        env:
          COMMANDER_ADVERSARIAL_API_KEY: ${{ secrets.COMMANDER_ADVERSARIAL_API_KEY }}
          COMMANDER_ADVERSARIAL_MODEL: ${{ vars.COMMANDER_ADVERSARIAL_MODEL || 'gpt-4o-mini' }}
        run: |
          if [ -z "$COMMANDER_ADVERSARIAL_API_KEY" ]; then
            echo "::warning::COMMANDER_ADVERSARIAL_API_KEY not set — skipping corpus generation"
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CORPUS_SIZE="${{ inputs.maxCorpusSize || '50' }}"
          BUDGET="${{ inputs.budgetUsd || '5.00' }}"

          cat > /tmp/run-adversarial.ts <<'EOF'
          import { AdversarialLLMAttacker } from './packages/core/src/security/adversarialAttacker';
          import { ATTACK_SCENARIOS } from './packages/core/src/security/redTeamFramework';
          import * as fs from 'node:fs';

          const config = {
            apiKey: process.env.COMMANDER_ADVERSARIAL_API_KEY!,
            attackerModel: (process.env.COMMANDER_ADVERSARIAL_MODEL || 'gpt-4o-mini') as 'gpt-4o-mini' | 'claude-haiku',
            maxTokensPerRun: 10_000,
            maxCorpusSize: parseInt(process.env.CORPUS_SIZE || '50', 10),
            weeklyBudgetUsd: parseFloat(process.env.BUDGET || '5.00'),
          };

          const baseline = ATTACK_SCENARIOS.map((s) => ({
            id: s.id,
            payload: s.payload,
            category: s.category,
          }));

          const attacker = new AdversarialLLMAttacker(config);
          const corpus = await attacker.generateCorpus(baseline);
          fs.writeFileSync('/tmp/adversarial-corpus.json', JSON.stringify(corpus, null, 2));
          console.log(`Generated ${corpus.length} attack variants`);
          EOF

          CORPUS_SIZE="$CORPUS_SIZE" BUDGET="$BUDGET" npx tsx /tmp/run-adversarial.ts
          echo "skipped=false" >> $GITHUB_OUTPUT

      - name: Test corpus against red team battery
        if: steps.generate.outputs.skipped != 'true'
        id: test
        run: |
          if [ ! -f /tmp/adversarial-corpus.json ]; then
            echo "::error::No corpus file generated"
            exit 1
          fi

          CORPUS_SIZE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/adversarial-corpus.json','utf-8')).length)")

          if [ "$CORPUS_SIZE" -eq 0 ]; then
            echo "::notice::Empty corpus — nothing to test"
            echo "novel_missed=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Testing $CORPUS_SIZE novel variants against defenses..."

          cat > /tmp/test-corpus.ts <<'EOF'
          import { RedTeamFramework, createComprehensiveDefender } from './packages/core/src/security/redTeamFramework';
          import * as fs from 'node:fs';

          const corpus = JSON.parse(fs.readFileSync('/tmp/adversarial-corpus.json', 'utf-8')) as Array<{ baseId: string; content: string; hash: string }>;

          const scenarios = corpus.map((v) => ({
            id: `ADV-${v.hash}`,
            category: 'prompt_injection' as const,
            name: `Adversarial variant of ${v.baseId}`,
            description: 'LLM-generated attack variant',
            payload: v.content,
            expectedDefense: 'contentScanner',
            severity: 'high' as const,
            cvssScore: 7.5,
            tags: ['adversarial', 'auto-generated'],
          }));

          const defender = createComprehensiveDefender();
          const framework = new RedTeamFramework({ scenarios });
          const report = await framework.runAll(defender);

          const novelMissed = report.results.filter((r) => r.result === 'missed');
          fs.writeFileSync('/tmp/adversarial-results.json', JSON.stringify({
            totalVariants: scenarios.length,
            blocked: report.summary.blocked,
            missed: report.summary.missed,
            errors: report.summary.error,
            novelMissed: novelMissed.map((r) => ({
              scenarioId: r.scenario.id,
              name: r.scenario.name,
              payload: r.scenario.payload,
              severity: r.scenario.severity,
              cvssScore: r.scenario.cvssScore,
            })),
          }, null, 2));

          console.log(`Blocked: ${report.summary.blocked}/${scenarios.length}`);
          console.log(`Missed: ${report.summary.missed} (will file gap issues)`);
          EOF

          npx tsx /tmp/test-corpus.ts
          NOVEL_MISSED=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/adversarial-results.json','utf-8')).novelMissed.length)")
          echo "novel_missed=$NOVEL_MISSED" >> $GITHUB_OUTPUT

      - name: File gap issues for novel missed attacks
        if: steps.test.outputs.novel_missed != '0' && steps.test.outputs.novel_missed != ''
        env:
          COMMANDER_GH_REPO: ${{ github.repository }}
          COMMANDER_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/report-adversarial.ts <<'EOF'
          import { reportNovelMissedAttacks } from './packages/core/src/security/gapDiscovery';
          import { RedTeamTestScenario, RedTeamTestResult } from './packages/core/src/security/redTeamFramework';
          import * as fs from 'node:fs';

          const results = JSON.parse(fs.readFileSync('/tmp/adversarial-results.json', 'utf-8')) as {
            novelMissed: Array<{ scenarioId: string; name: string; payload: string; severity: 'low'|'medium'|'high'|'critical'; cvssScore: number }>;
          };

          // Reconstruct RedTeamTestResult objects
          const novelMissed: RedTeamTestResult[] = results.novelMissed.map((m) => ({
            scenario: {
              id: m.scenarioId,
              category: 'prompt_injection',
              name: m.name,
              description: 'Adversarial attack',
              payload: m.payload,
              expectedDefense: 'contentScanner',
              severity: m.severity,
              cvssScore: m.cvssScore,
              tags: ['adversarial'],
            } as RedTeamTestScenario),
            result: 'missed',
            durationMs: 0,
          }));

          await reportNovelMissedAttacks(novelMissed, new Set());
          console.log(`Filed ${novelMissed.length} gap issues`);
          EOF

          npx tsx /tmp/report-adversarial.ts

      - name: Upload corpus artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-corpus-${{ github.run_id }}
          path: /tmp/adversarial-corpus.json
          retention-days: 90

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-results-${{ github.run_id }}
          path: /tmp/adversarial-results.json
          retention-days: 90

      - name: Generate step summary
        if: always()
        run: |
          echo "## 🗡️ Adversarial Corpus Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/adversarial-results.json ]; then
            node -e "
              const r = JSON.parse(require('fs').readFileSync('/tmp/adversarial-results.json','utf-8'));
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              console.log('| Variants generated | ' + r.totalVariants + ' |');
              console.log('| Blocked | ' + r.blocked + ' |');
              console.log('| Missed (novel) | **' + r.missed + '** |');
              console.log('| Errors | ' + r.errors + ' |');
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "_Run was skipped or failed before results were captured._" >> $GITHUB_STEP_SUMMARY
          fi
