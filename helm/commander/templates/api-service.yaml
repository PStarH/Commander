apiVersion: v1
kind: Service
metadata:
  name: {{ include "commander.fullname" . }}-api
  labels:
    app.kubernetes.io/component: api
    {{- include "commander.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: api
    {{- include "commander.selectorLabels" . | nindent 4 }}
