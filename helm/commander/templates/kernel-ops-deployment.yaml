{{- if .Values.kernelOps.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "commander.fullname" . }}-kernel-ops
  labels:
    app.kubernetes.io/component: kernel-ops
    {{- include "commander.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kernelOps.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: kernel-ops
      {{- include "commander.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kernel-ops
        {{- include "commander.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "commander.fullname" . }}
      initContainers:
        - name: kernel-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}-kernel-ops"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "packages/kernel/dist/migrate.js"]
          env:
            - name: DATABASE_URL
              value: "postgres://{{ .Values.database.user }}:{{ .Values.database.password }}@{{ include "commander.fullname" . }}-postgres:5432/{{ .Values.database.name }}"
      containers:
        - name: kernel-ops
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}-kernel-ops"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              value: "postgres://{{ .Values.database.user }}:{{ .Values.database.password }}@{{ include "commander.fullname" . }}-postgres:5432/{{ .Values.database.name }}"
            {{- range $key, $value := .Values.kernelOps.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.kernelOps.resources | nindent 12 }}
{{- end }}
