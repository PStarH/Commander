{{- if .Values.timer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "commander.fullname" . }}-timer
  labels:
    app.kubernetes.io/component: timer
    {{- include "commander.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.timer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: timer
      {{- include "commander.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: timer
        {{- include "commander.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "commander.fullname" . }}
      containers:
        - name: timer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}-timer"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              value: "postgres://{{ .Values.database.user }}:{{ .Values.database.password }}@{{ include "commander.fullname" . }}-postgres:5432/{{ .Values.database.name }}"
            {{- range $key, $value := .Values.timer.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.timer.resources | nindent 12 }}
{{- end }}
