# Default values for commander.
replicaCount: 1

image:
  repository: ghcr.io/pstarh/commander
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

api:
  enabled: true
  replicas: 1
  port: 4000
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  env:
    NODE_ENV: production
    PORT: "4000"
    API_STORE_BACKEND: postgres
    COMMANDER_KERNEL_ENABLED: "1"
  secrets:
    COMMANDER_API_KEY: ""

worker:
  enabled: true
  replicas: 2
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  env:
    NODE_ENV: production
    COMMANDER_WORKER_BOOTSTRAP: /app/packages/worker-plane/dist/bootstrap.js
    COMMANDER_WORKER_AUTH_SUBJECT: worker
    COMMANDER_WORKER_CAPABILITIES: "agent,tool,connector"
    COMMANDER_WORKER_MAX_CONCURRENCY: "10"
    # Explicit tenant list required. '*' / empty fail-closed at worker bootstrap.
    # Canonical chart: deploy/helm/commander (values-demo: local; enterprise: operator list).
    COMMANDER_WORKER_TENANTS: "local"
    COMMANDER_WORKER_LEASE_TTL_MS: "30000"
    COMMANDER_WORKER_HEARTBEAT_MS: "10000"
    COMMANDER_WORKER_POLL_MS: "250"
  secrets:
    COMMANDER_WORKER_AUTH_TOKEN: worker-token

kernelOps:
  enabled: true
  replicas: 1
  health:
    port: 8081
    livenessPath: /health
    readinessPath: /ready
    livenessInitialDelaySeconds: 10
    livenessPeriodSeconds: 15
    readinessInitialDelaySeconds: 5
    readinessPeriodSeconds: 10
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
    NODE_ENV: production
    COMMANDER_RECLAIM_INTERVAL_MS: "5000"
    COMMANDER_RECLAIM_BATCH_SIZE: "100"
    COMMANDER_TIMER_POLL_MS: "5000"
    COMMANDER_TIMER_BATCH_SIZE: "100"
    COMMANDER_OUTBOX_INTERVAL_MS: "1000"
    COMMANDER_OUTBOX_BATCH_SIZE: "100"
    COMMANDER_OUTBOX_MAX_ATTEMPTS: "10"

database:
  # Set to false if you provide your own Postgres instance via externalDatabase.
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  user: commander
  password: commander
  name: commander
  storage:
    size: 10Gi

externalDatabase:
  host: ""
  port: 5432
  user: ""
  password: ""
  name: ""

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
