# Commander Compensation Alert Rules
#
# These Prometheus alerting rules fire when the compensation subsystem
# encounters sustained failures or anomalous behavior. Add this file to
# your Prometheus rule_files configuration:
#
#   rule_files:
#     - /etc/prometheus/commander-alert-rules.yml
#
# All metrics are exported by Commander's /metrics endpoint in OpenMetrics
# format (text/plain; version=0.0.4). For metric definitions see:
#   packages/core/src/runtime/metricsCollector.ts
#
# Label conventions:
#   - tool:       the mutation tool name (file_write, shell_execute, etc.)
#   - status:     step status (started, completed, failed)
#   - outcome:    compensation outcome (success, failed, exhausted)
#   - risk:       plan risk level (safe, review, destructive)
#
# Customization:
#   - Replace `team: infra` with your own team label (or remove it)
#   - Adjust alert thresholds based on your workload patterns
#   - Set runbook_url to point to your own runbooks

groups:
  - name: commander_compensation
    interval: 30s
    rules:

      # ── Sustained Compensation Step Failures ────────────────────────────
      # Fires when more than 5 compensation steps have failed in the last
      # 5 minutes across all tools. Use a rate query (per-second rate)
      # to avoid spiking on a single burst.
      - alert: CompensationStepFailuresHigh
        expr: |
          rate(compensation_steps_total{status="failed"}[5m]) > 0.0167
        for: 2m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "High rate of compensation step failures ({{ $value | humanize }} per second)"
          description: >
            Compensation steps are failing at {{ $value | humanize }} per second
            over the last 5 minutes. This may indicate a systemic issue with
            rollback operations (e.g., permission errors, missing snapshots).
            Check /dashboard/compensation for per-tool and per-status breakdowns.
          runbook_url: "https://commander.dev/docs/runbooks/compensation-failures"

      # ── Compensation Exhaustion ─────────────────────────────────────────
      # Fires when any tool exhausts its compensation retries, meaning the
      # system has given up on undoing a mutation. This is a critical event
      # — manual intervention is required.
      - alert: CompensationExhausted
        expr: |
          rate(compensation_total{outcome="exhausted"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Compensation exhausted for {{ $labels.tool }}"
          description: >
            Compensation retries have been exhausted for tool "{{ $labels.tool }}".
            The system was unable to undo a mutation. Manual investigation and
            remediation are required. Check dead-letter queue entries with
            category "compensation" for detailed error context.
          runbook_url: "https://commander.dev/docs/runbooks/compensation-exhausted"

      # ── Total Compensation Failure Rate ─────────────────────────────────
      # Fires when the overall failure rate of compensation operations
      # exceeds 20% over a 10-minute window. A small number of failures is
      # expected (transient filesystem issues), but sustained >20% failure
      # indicates a systemic problem.
      - alert: CompensationFailureRateHigh
        expr: |
          rate(compensation_total{outcome=~"failed|exhausted"}[10m])
          /
          (rate(compensation_total[10m]) > 0)
          > 0.2
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Compensation failure rate {{ $value | humanizePercentage }} exceeded 20%"
          description: >
            {{ $value | humanizePercentage }} of compensation operations failed
            or were exhausted over the last 10 minutes. High failure rates may
            indicate filesystem, permission, or configuration issues.
            Check /dashboard/compensation for detailed breakdowns.

      # ── No Compensation Plans Created ───────────────────────────────────
      # Fires when no compensation plans have been created in the last 30 minutes.
      # Uses changes() for faster detection than rate() == 0.
      # This is an informational alert — it may be expected in environments
      # with no mutation tool usage. Use it to detect whether the compensation
      # subsystem is receiving any activity at all.
      - alert: CompensationPlannedAbsent
        expr: |
          changes(compensation_planned_total[30m]) == 0
        for: 5m
        labels:
          severity: info
          team: infra
        annotations:
          summary: "No compensation plans created in the last 30 minutes"
          description: >
            No compensation plans have been created in the last 30 minutes. If
            mutation tools are active, this may indicate that the compensation
            event subscriber is not wired correctly or the bus is not publishing
            tool.compensation_planned events.
            Check /dashboard/compensation for the current activity status.

      # ── Rapid Plan-Exhaustion Cycle ─────────────────────────────────────
      # Fires when more than 3 plans are created but all compensations are
      # exhausted in a 5-minute window. This detects a "death spiral" where
      # mutations succeed but rollbacks keep failing.
      - alert: CompensationDeathSpiral
        expr: |
          rate(compensation_planned_total[5m]) > 0.01
          and
          rate(compensation_total{outcome="exhausted"}[5m]) / rate(compensation_planned_total[5m]) > 0.5
        for: 3m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Compensation death spiral detected — {{ $labels.tool | default('all tools') }}"
          description: >
            More than 50% of compensation plans result in exhausted retries.
            This indicates a systemic failure where mutations succeed but their
            rollbacks cannot be performed. Immediate investigation required.
            Check dead-letter queue and compensation dashboard.

      # ── Per-Tool Step Failure Spike ─────────────────────────────────────
      # Fires when a specific tool's compensation steps fail more than
      # 3 times in 5 minutes. This granular alert helps identify which
      # mutation tool is problematic.
      - alert: CompensationToolStepFailures
        expr: |
          rate(compensation_steps_total{status="failed"}[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Compensation step failures for tool {{ $labels.tool }}"
          description: >
            Tool "{{ $labels.tool }}" has {{ $value | humanize }} compensation
            step failures per second over 5 minutes. This may indicate that the
            tool's compensation handler is broken or the required inverse
            operations (e.g., file restoration, state rollback) are failing.
