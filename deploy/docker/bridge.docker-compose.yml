# =============================================================================
# Bridge deployment for a group of tenants that share a container / namespace
# but keep logically-isolated data subdirectories.
#
# Usage (from repo root):
#   export BRIDGE_GROUP=team-alpha
#   export TENANT_IDS=tenant-a,tenant-b
#   envsubst < deploy/docker/bridge.docker-compose.yml > /tmp/bridge-${BRIDGE_GROUP}.yml
#   docker compose -f /tmp/bridge-${BRIDGE_GROUP}.yml up -d
# =============================================================================

services:
  commander-bridge:
    build:
      context: ../..
      target: api
      args:
        - NODE_ENV=production
    image: ${COMMANDER_IMAGE:-commander-api:latest}
    container_name: commander-bridge-${BRIDGE_GROUP}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DEPLOYMENT_MODEL=bridge
      - BRIDGE_GROUP=${BRIDGE_GROUP}
      - TENANT_IDS=${TENANT_IDS:?TENANT_IDS is required (comma-separated tenant IDs)}
      - TENANT_CONFIG_PATH=/app/config/tenants.json
      - COMMANDER_DATA_ROOT=/data
      - COMMANDER_API_KEY=${COMMANDER_API_KEY:?COMMANDER_API_KEY is required}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Shared tenant registry (read-only at runtime)
      - ../../config/tenants.json:/app/config/tenants.json:ro
      # Tenant API keys (read-only at runtime)
      - ../../.commander/tenant-api-keys.json:/app/.commander/tenant-api-keys.json:ro
      # Shared bridge volume; each tenant writes to /data/bridge/<tenantId>
      - bridge-data-${BRIDGE_GROUP}:/data/bridge
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bridge-data-${BRIDGE_GROUP}:
    driver: local
