# =============================================================================
# WS9 live-fire isolation environment.
# spec/ws9-tenant-livefire-compliance.md §3 (Test Infrastructure Requirements).
#
# Isolated docker-compose stack for adversarial cross-tenant live-fire tests:
#   * postgres        — real PostgreSQL 16, RLS + WITH CHECK, non-owner role
#   * vault           — HashiCorp Vault dev server (KV v2), pre-populated secrets
#   * vault-init      — one-shot that writes test secrets into Vault
#   * commander-api   — built from the project Dockerfile (api target), wired to
#                       postgres + vault, gVisor sandbox env, /v1 gateway only
#
# TESTING ONLY — NOT FOR PRODUCTION. Dev root token, non-HA, test fixtures.
# =============================================================================
#
# Usage (from repo root):
#   docker compose -f deploy/docker/docker-compose.ws9-livefire.yml up -d
#   docker compose -f deploy/docker/docker-compose.ws9-livefire.yml down -v
#
# Host-side env vars for the ws9-env-check / ws9-livefire scripts:
#   export COMMANDER_DB_HOST=localhost COMMANDER_DB_PORT=5432
#   export COMMANDER_DB_NAME=commander COMMANDER_DB_USER=commander_app
#   export COMMANDER_DB_PASSWORD=commander_app
#   export COMMANDER_VAULT_ADDR=http://localhost:8200 COMMANDER_VAULT_TOKEN=root
#   export COMMANDER_API_HOST=localhost COMMANDER_API_PORT=3000
#   export COMMANDER_WS9_API_KEY_A=ws9-tenant-a-api-key-test-only

name: ws9-livefire

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — real backend, RLS + WITH CHECK, commander_app non-owner.
  # Init script is the WS9-specific file (production postgres-init.sql is left
  # untouched).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ws9-postgres
    environment:
      POSTGRES_USER: commander
      POSTGRES_PASSWORD: commander
      POSTGRES_DB: commander
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init.ws9-livefire.sql:/docker-entrypoint-initdb.d/01-ws9-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commander -d commander"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ws9-livefire-net

  # ---------------------------------------------------------------------------
  # HashiCorp Vault — dev server, root token "root", KV v2.
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:latest
    container_name: ws9-vault
    cap_add:
      - IPC_LOCK
    # Dev mode: in-memory, unsealed, root token "root", listens on all interfaces.
    command: ["server", "-dev", "-dev-root-token-id=root", "-dev-listen-address=0.0.0.0:8200"]
    environment:
      # Client-side address used by the `vault status` healthcheck below.
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "127.0.0.1:8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "vault status"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ws9-livefire-net

  # ---------------------------------------------------------------------------
  # One-shot: populate Vault with test secrets (KV v2) before the API starts.
  # ---------------------------------------------------------------------------
  vault-init:
    image: hashicorp/vault:latest
    container_name: ws9-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./vault-init.sh:/vault-init.sh:ro
    entrypoint: ["/bin/sh", "/vault-init.sh"]
    restart: "no"
    networks:
      - ws9-livefire-net

  # ---------------------------------------------------------------------------
  # Commander API — built from repo Dockerfile (api target).
  # NODE_ENV=production + COMMANDER_V2_MODE=1 disable legacy /api/* execution
  # (apps/api/src/legacyExecutionGuard.ts), leaving /v1, /health, /metrics as
  # the only reachable surface (enforced/verified by ws9-env-check).
  # ---------------------------------------------------------------------------
  commander-api:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: api
    image: ${COMMANDER_API_IMAGE:-commander-api:ws9-livefire}
    container_name: ws9-commander-api
    environment:
      NODE_ENV: production
      PORT: "3000"
      COMMANDER_V2_MODE: "1"
      # Required in production — without this jwtMiddleware refuses to boot.
      JWT_SECRET: ws9-livefire-jwt-secret-not-for-production
      # IntegrityLayer HMAC (refresh store / signed payloads) — TESTING ONLY.
      COMMANDER_INTEGRITY_KEY: ws9-livefire-integrity-key-32chars-min
      # Production boot gate (apps/api validateEnvironment) — TESTING ONLY.
      # Prefer Vault injection in real deploys; these exist so the live-fire
      # API container can start under NODE_ENV=production.
      COMMANDER_MASTER_KEY: ws9-livefire-master-key-must-be-32b-min!!
      COMMANDER_API_KEY: ws9-livefire-commander-api-key-test-only
      COMMANDER_CAPABILITY_TOKEN_KEY: ws9-livefire-capability-token-key-32
      # Tenant-bound API keys for DATA-2 header-forge live-fire (TESTING ONLY).
      TENANT_API_KEYS: "tenant-a:ws9-tenant-a-api-key-test-only;tenant-b:ws9-tenant-b-api-key-test-only"
      # Postgres via the non-owner, RLS-subject role.
      COMMANDER_DB_HOST: postgres
      COMMANDER_DB_PORT: "5432"
      COMMANDER_DB_NAME: commander
      COMMANDER_DB_USER: commander_app
      COMMANDER_DB_PASSWORD: commander_app
      DATABASE_URL: postgres://commander_app:commander_app@postgres:5432/commander
      # WS9: commander_app has no CREATE on schema (spec). Keep API stores off
      # Postgres DDL; RLS live-fire uses COMMANDER_DB_* via host-side psql.
      API_STORE_BACKEND: memory
      COMMANDER_MEMORY_STORE: in-memory
      # Vault-only secret path. No *_API_KEY / *_SECRET in process.env
      # (ws9-env-check enforces the keypath allowlist).
      COMMANDER_VAULT_ADDR: http://vault:8200
      COMMANDER_VAULT_TOKEN: root
      # gVisor sandbox. runsc must be installed on the HOST (not in this
      # container); see README-ws9.md. Requires a Linux host.
      COMMANDER_SANDBOX_ISOLATION: gvisor
      COMMANDER_SANDBOX_RUNTIME: runsc
      COMMANDER_LOG_LEVEL: info
      # Audit chain logs live on a volume separate from app data + manifest
      # (spec §3.1: HMAC key and log storage physically separated).
      COMMANDER_AUDIT_PERSIST_DIR: /var/lib/commander/audit
      COMMANDER_AUDIT_MANIFEST_DIR: /var/lib/commander/manifest
      COMMANDER_AUDIT_CHAIN_KEY: ws9-livefire-audit-chain-key-32chars!!
      COMMANDER_MANIFEST_KEY: ws9-livefire-manifest-key-do-not-reuse
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    volumes:
      - audit-log:/var/lib/commander/audit
      - chain-manifest:/var/lib/commander/manifest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ws9-livefire-net

# ---------------------------------------------------------------------------
# Volumes — audit log and chain manifest are deliberately separate from each
# other and from app/DB data (spec §3.1 key/log physical separation).
# ---------------------------------------------------------------------------
volumes:
  pg-data:
  audit-log:
  chain-manifest:

networks:
  ws9-livefire-net:
    driver: bridge
