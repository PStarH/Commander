# =============================================================================
# Commander Helm Chart — Values (Cell v0)
# =============================================================================

# Deployment tier: demo | team | enterprise
tier: 'team'

image:
  repository: commander
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

api:
  replicas: 2
  port: 4000
  terminationGracePeriodSeconds: 60
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 4Gi
  health:
    livenessPath: /health
    readinessPath: /ready
    metricsPath: /metrics
    initialDelaySeconds: 10
    periodSeconds: 15
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 1
  secrets:
    existingSecret: ''
    create: false
    masterKeySecret: ''
    jwtSecretSecret: ''
    apiKeySecret: ''
    capabilityTokenKeySecret: ''
    integrityKeySecret: ''

web:
  enabled: true
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

worker:
  enabled: false
  replicas: 2
  terminationGracePeriodSeconds: 60
  health:
    port: 8083
    livenessPath: /health
    readinessPath: /ready
    initialDelaySeconds: 15
    periodSeconds: 15
  image:
    repository: ''
    tag: ''
    pullPolicy: ''
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 4Gi
  bootstrap: /app/packages/worker-plane/dist/bootstrap.js
  authSubject: worker
  authTokenSecret: ''
  authTokenSecretKey: token
  kind: agent
  capabilities: 'agent,tool,connector'
  maxConcurrency: 10
  tenants: '*'
  pollMs: 250
  leaseTtlMs: 30000
  heartbeatMs: 10000

kernelOps:
  enabled: false
  replicas: 1
  terminationGracePeriodSeconds: 60
  image:
    repository: ''
    tag: ''
    pullPolicy: ''
  health:
    port: 8081
    livenessPath: /health
    readinessPath: /ready
    livenessInitialDelaySeconds: 10
    livenessPeriodSeconds: 15
    readinessInitialDelaySeconds: 5
    readinessPeriodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    COMMANDER_RECLAIM_INTERVAL_MS: '5000'
    COMMANDER_RECLAIM_BATCH_SIZE: '100'
    COMMANDER_TIMER_POLL_MS: '5000'
    COMMANDER_TIMER_BATCH_SIZE: '100'
    COMMANDER_OUTBOX_INTERVAL_MS: '1000'
    COMMANDER_OUTBOX_BATCH_SIZE: '100'
    COMMANDER_OUTBOX_MAX_ATTEMPTS: '10'

adapterOps:
  enabled: false
  replicas: 2
  terminationGracePeriodSeconds: 60
  image:
    repository: ''
    tag: ''
    pullPolicy: ''
  health:
    port: 8082
    livenessPath: /health
    readinessPath: /ready
    livenessInitialDelaySeconds: 10
    livenessPeriodSeconds: 15
    readinessInitialDelaySeconds: 5
    readinessPeriodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  secrets:
    existingSecret: ''
    create: false
  egress:
    allowlist: []

sandboxd:
  enabled: false

migration:
  terminationGracePeriodSeconds: 30
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

llm:
  provider: ''
  model: ''
  openaiApiKeySecret: ''
  anthropicApiKeySecret: ''
  googleApiKeySecret: ''

redis:
  enabled: false
  image:
    repository: redis
    tag: '7-alpine'
  port: 6379
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ''

database:
  enabled: false
  backend: sqlite
  postgres:
    bundled: false
    image:
      repository: postgres
      tag: '16-alpine'
    port: 5432
    user: commander
    password: ''
    database: commander
    existingSecret: ''
    existingSecretKey: url
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ''
  connectionString: ''

persistence:
  enabled: true
  storageClass: ''
  stateSize: 5Gi
  tracesSize: 10Gi
  memorySize: 5Gi
  resultsSize: 10Gi

config:
  nodeEnv: production
  logLevel: info
  corsOrigins: ''
  rateLimitPerMinute: 120
  tokenBudgetHardCap: 200000
  maxConcurrency: 20
  tenantProvider: 'simple'

observability:
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  otel:
    enabled: false
    endpoint: ''
    serviceName: commander

ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
    - host: commander.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

serviceAccount:
  create: true
  name: ''
  annotations: {}
  automount: false

networkPolicy:
  enabled: false
  ingressControllerNamespace: ''
  egress:
    adapterCidrs: []
    databaseCidrs: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
