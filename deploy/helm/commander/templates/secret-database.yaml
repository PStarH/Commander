# =============================================================================
# Commander — Database URL Secret
# =============================================================================
{{- if and (include "commander.bundledPostgres" .) (not .Values.database.postgres.existingSecret) }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (include "commander.databaseUrlSecretName" .) }}
{{- $existingPassword := "" }}
{{- if and $secret $secret.data (index $secret.data "postgres-password") }}
{{- $existingPassword = index $secret.data "postgres-password" | b64dec }}
{{- end }}
{{- $password := .Values.database.postgres.password | default $existingPassword | default (randAlphaNum 24) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "commander.databaseUrlSecretName" . }}
  labels:
    {{- include "commander.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "commander.databaseUrlSecretKey" . }}: {{ printf "postgres://%s:%s@%s-postgres:%s/%s" .Values.database.postgres.user $password (include "commander.fullname" .) (.Values.database.postgres.port | toString) .Values.database.postgres.database | b64enc | quote }}
  postgres-password: {{ $password | b64enc | quote }}
{{- end }}
