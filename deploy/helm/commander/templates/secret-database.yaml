# =============================================================================
# Commander — Database URL Secret (bundled Postgres: four DSNs + role passwords)
# =============================================================================
{{- if and (include "commander.bundledPostgres" .) (not .Values.database.postgres.existingSecret) }}
{{- $secretName := include "commander.databaseUrlSecretName" . }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingPassword := "" }}
{{- $existingOwnerPassword := "" }}
{{- $existingAppPassword := "" }}
{{- $existingSchedulerPassword := "" }}
{{- $existingWorkerPassword := "" }}
{{- if and $secret $secret.data }}
{{- if index $secret.data "postgres-password" }}
{{- $existingPassword = index $secret.data "postgres-password" | b64dec }}
{{- end }}
{{- if index $secret.data "owner-password" }}
{{- $existingOwnerPassword = index $secret.data "owner-password" | b64dec }}
{{- end }}
{{- if index $secret.data "app-password" }}
{{- $existingAppPassword = index $secret.data "app-password" | b64dec }}
{{- end }}
{{- if index $secret.data "scheduler-password" }}
{{- $existingSchedulerPassword = index $secret.data "scheduler-password" | b64dec }}
{{- end }}
{{- if index $secret.data "worker-password" }}
{{- $existingWorkerPassword = index $secret.data "worker-password" | b64dec }}
{{- end }}
{{- end }}
{{- $password := .Values.database.postgres.password | default $existingPassword | default (randAlphaNum 24) }}
{{- $ownerPassword := $existingOwnerPassword | default (randAlphaNum 24) }}
{{- $appPassword := $existingAppPassword | default (randAlphaNum 24) }}
{{- $schedulerPassword := $existingSchedulerPassword | default (randAlphaNum 24) }}
{{- $workerPassword := $existingWorkerPassword | default (randAlphaNum 24) }}
{{- $host := printf "%s-postgres" (include "commander.fullname" .) }}
{{- $port := .Values.database.postgres.port | toString }}
{{- $db := .Values.database.postgres.database }}
{{- $ownerUrl := printf "postgres://commander_owner:%s@%s:%s/%s" $ownerPassword $host $port $db }}
{{- $appUrl := printf "postgres://commander_app:%s@%s:%s/%s" $appPassword $host $port $db }}
{{- $schedulerUrl := printf "postgres://commander_scheduler:%s@%s:%s/%s" $schedulerPassword $host $port $db }}
{{- $workerUrl := printf "postgres://commander_worker:%s@%s:%s/%s" $workerPassword $host $port $db }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "commander.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "commander.databaseOwnerSecretKey" . }}: {{ $ownerUrl | b64enc | quote }}
  {{ include "commander.databaseAppSecretKey" . }}: {{ $appUrl | b64enc | quote }}
  {{ include "commander.databaseSchedulerSecretKey" . }}: {{ $schedulerUrl | b64enc | quote }}
  {{ include "commander.databaseWorkerSecretKey" . }}: {{ $workerUrl | b64enc | quote }}
  owner-password: {{ $ownerPassword | b64enc | quote }}
  app-password: {{ $appPassword | b64enc | quote }}
  scheduler-password: {{ $schedulerPassword | b64enc | quote }}
  worker-password: {{ $workerPassword | b64enc | quote }}
  postgres-password: {{ $password | b64enc | quote }}
{{- end }}
