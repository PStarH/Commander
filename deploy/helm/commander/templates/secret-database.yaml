# =============================================================================
# Commander — Database URL Secret
# =============================================================================
# Stores the full PostgreSQL connection string in a Secret. Pods reference it
# via valueFrom.secretKeyRef so the password is not visible in Pod env vars or
# in `kubectl describe pod` output.
#
# If database.postgres.existingSecret is set, this Secret is not created and
# the chart uses the user-provided Secret instead.
# =============================================================================
{{- if and .Values.database.enabled (eq .Values.database.backend "postgres") (not .Values.database.postgres.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "commander.databaseUrlSecretName" . }}
  labels:
    {{- include "commander.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "commander.databaseUrlSecretKey" . }}: {{ printf "postgres://%s:%s@%s-postgres:%s/%s" .Values.database.postgres.user .Values.database.postgres.password (include "commander.fullname" .) (.Values.database.postgres.port | toString) .Values.database.postgres.database | b64enc | quote }}
{{- end }}
