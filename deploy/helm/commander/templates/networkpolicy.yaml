# =============================================================================
# Commander — Network Policy (Enterprise tier)
# =============================================================================
{{- if .Values.redis.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commander.fullname" . }}-redis
  labels:
    {{- include "commander.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "commander.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
{{- end }}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commander.fullname" . }}-api
  labels:
    {{- include "commander.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.web.enabled }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: web
        {{- end }}
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}

{{- if .Values.networkPolicy.enabled }}
---
# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commander.fullname" . }}-default-deny
  labels:
    {{- include "commander.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow ingress to API from the same namespace and the ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commander.fullname" . }}-api-ingress
  labels:
    {{- include "commander.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        {{- with .Values.networkPolicy.ingressControllerNamespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}

---
# Allow API egress to DNS, PostgreSQL, and Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commander.fullname" . }}-api-egress
  labels:
    {{- include "commander.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL
    {{- if .Values.database.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "commander.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: {{ .Values.database.postgres.port }}
    {{- end }}
    # Redis
    {{- if .Values.redis.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "commander.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
    {{- end }}

---
# Allow worker egress to PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commander.fullname" . }}-worker-egress
  labels:
    {{- include "commander.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL
    {{- if .Values.database.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "commander.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: {{ .Values.database.postgres.port }}
    {{- end }}
{{- end }}
