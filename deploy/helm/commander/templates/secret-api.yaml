{{- if and .Values.api.secrets.create (not .Values.api.secrets.existingSecret) (eq .Values.tier "demo") }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (include "commander.apiSecretName" .) }}
{{- $apiKey := randAlphaNum 32 }}
{{- $jwtSecret := randAlphaNum 32 }}
{{- $masterKey := randAlphaNum 32 }}
{{- $capabilityTokenKey := randAlphaNum 32 }}
{{- $integrityKey := randAlphaNum 32 }}
{{- if and $secret $secret.data }}
{{- if index $secret.data "api-key" }}{{- $apiKey = index $secret.data "api-key" | b64dec }}{{- end }}
{{- if index $secret.data "jwt-secret" }}{{- $jwtSecret = index $secret.data "jwt-secret" | b64dec }}{{- end }}
{{- if index $secret.data "master-key" }}{{- $masterKey = index $secret.data "master-key" | b64dec }}{{- end }}
{{- if index $secret.data "capability-token-key" }}{{- $capabilityTokenKey = index $secret.data "capability-token-key" | b64dec }}{{- end }}
{{- if index $secret.data "integrity-key" }}{{- $integrityKey = index $secret.data "integrity-key" | b64dec }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "commander.fullname" . }}-api-secrets
  labels:
    {{- include "commander.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ $apiKey | quote }}
  jwt-secret: {{ $jwtSecret | quote }}
  master-key: {{ $masterKey | quote }}
  capability-token-key: {{ $capabilityTokenKey | quote }}
  integrity-key: {{ $integrityKey | quote }}
{{- end }}
