# =============================================================================
# Commander API — PodDisruptionBudget
# =============================================================================
{{- if .Values.api.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "commander.fullname" . }}-api
  labels:
    {{- include "commander.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      {{- include "commander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
