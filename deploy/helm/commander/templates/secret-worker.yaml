{{- if and .Values.worker.enabled (not .Values.worker.authTokenSecret) (eq .Values.tier "demo") }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (include "commander.workerTokenSecretName" .) }}
{{- $token := randAlphaNum 32 }}
{{- if and $secret $secret.data (index $secret.data "token") }}
{{- $token = index $secret.data "token" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "commander.fullname" . }}-worker-token
  labels:
    {{- include "commander.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ $token | quote }}
{{- end }}
