{{- if and .Values.adapterOps.enabled .Values.adapterOps.secrets.create (not .Values.adapterOps.secrets.existingSecret) (eq .Values.tier "demo") }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (printf "%s-adapter-secrets" (include "commander.fullname" .)) }}
{{- $githubToken := randAlphaNum 32 }}
{{- $snUsername := "demo" }}
{{- $snPassword := randAlphaNum 16 }}
{{- $snInstance := "demo.service-now.com" }}
{{- if and $secret $secret.data }}
{{- if index $secret.data "github-token" }}{{- $githubToken = index $secret.data "github-token" | b64dec }}{{- end }}
{{- if index $secret.data "servicenow-username" }}{{- $snUsername = index $secret.data "servicenow-username" | b64dec }}{{- end }}
{{- if index $secret.data "servicenow-password" }}{{- $snPassword = index $secret.data "servicenow-password" | b64dec }}{{- end }}
{{- if index $secret.data "servicenow-instance" }}{{- $snInstance = index $secret.data "servicenow-instance" | b64dec }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "commander.fullname" . }}-adapter-secrets
  labels:
    {{- include "commander.labels" . | nindent 4 }}
type: Opaque
stringData:
  github-token: {{ $githubToken | quote }}
  servicenow-username: {{ $snUsername | quote }}
  servicenow-password: {{ $snPassword | quote }}
  servicenow-instance: {{ $snInstance | quote }}
{{- end }}
