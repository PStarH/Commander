# =============================================================================
# Commander — Worker Deployment
# =============================================================================
{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "commander.fullname" . }}-worker
  labels:
    {{- include "commander.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "commander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "commander.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "commander.serviceAccountName" . }}
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount | default true }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository | default .Values.image.repository }}:{{ .Values.worker.image.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy | default .Values.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: {{ .Values.config.nodeEnv | quote }}
            {{- if .Values.database.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "commander.databaseUrlSecretName" . | quote }}
                  key: {{ include "commander.databaseUrlSecretKey" . | quote }}
            {{- end }}
            - name: COMMANDER_WORKER_BOOTSTRAP
              value: {{ .Values.worker.bootstrap | quote }}
            {{- if .Values.worker.authTokenSecret }}
            - name: COMMANDER_WORKER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worker.authTokenSecret | quote }}
                  key: {{ .Values.worker.authTokenSecretKey | default "token" | quote }}
            {{- end }}
            - name: COMMANDER_WORKER_AUTH_SUBJECT
              value: {{ .Values.worker.authSubject | quote }}
            - name: COMMANDER_WORKER_KIND
              value: {{ .Values.worker.kind | quote }}
            - name: COMMANDER_WORKER_CAPABILITIES
              value: {{ .Values.worker.capabilities | quote }}
            - name: COMMANDER_WORKER_MAX_CONCURRENCY
              value: {{ .Values.worker.maxConcurrency | quote }}
            - name: COMMANDER_WORKER_TENANTS
              value: {{ .Values.worker.tenants | quote }}
            - name: COMMANDER_WORKER_POLL_MS
              value: {{ .Values.worker.pollMs | quote }}
            - name: COMMANDER_WORKER_LEASE_TTL_MS
              value: {{ .Values.worker.leaseTtlMs | quote }}
            - name: COMMANDER_WORKER_HEARTBEAT_MS
              value: {{ .Values.worker.heartbeatMs | quote }}
          resources: {{ toYaml .Values.worker.resources | nindent 12 }}
          securityContext: {{ toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
