{{- /* Demo only: ephemeral Ed25519 materials for worker/adapter authority.
     Deployments never inline PEM/JWKS — only secretKeyRef.
     Enterprise must use capability.existingSecret (this template does not render). */ -}}
{{- if and (or .Values.worker.enabled .Values.adapterOps.enabled) .Values.capability.create (not .Values.capability.existingSecret) (eq .Values.tier "demo") }}
{{- $secretName := include "commander.capabilitySecretName" . }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- /* Fixed matching demo keypair (DEV ONLY). Lookup preserves across upgrades.
     Helm cannot derive JWKS from genPrivateKey, so materials must be paired.
     Per-install random keys require a Job/hook outside this template. */ -}}
{{- $privateKeyPem := "-----BEGIN PRIVATE KEY-----\nMC4CAQAwBQYDK2VwBCIEIFWarjoYgf7dQVisRYMlqz59skWamIzLDwDnj02Opt+i\n-----END PRIVATE KEY-----\n" }}
{{- $keyId := "demo-cell-ed25519" }}
{{- $jwksJson := "{\"keys\":[{\"kty\":\"OKP\",\"crv\":\"Ed25519\",\"x\":\"K5RiQabAgBeM1jYEnxKYCcjmeoTWh-lFvPGTnN_i99E\",\"kid\":\"demo-cell-ed25519\"}]}" }}
{{- if and $secret $secret.data }}
{{- if index $secret.data "private-key-pem" }}{{- $privateKeyPem = index $secret.data "private-key-pem" | b64dec }}{{- end }}
{{- if index $secret.data "key-id" }}{{- $keyId = index $secret.data "key-id" | b64dec }}{{- end }}
{{- if index $secret.data "jwks-json" }}{{- $jwksJson = index $secret.data "jwks-json" | b64dec }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "commander.labels" . | nindent 4 }}
  annotations:
    commander.io/capability-keys: "demo-dev-fixed-pair"
    commander.io/not-for-production: "true"
type: Opaque
stringData:
  {{ include "commander.capabilityPrivateKeyPemKey" . }}: {{ $privateKeyPem | quote }}
  {{ include "commander.capabilityKeyIdKey" . }}: {{ $keyId | quote }}
  {{ include "commander.capabilityJwksJsonKey" . }}: {{ $jwksJson | quote }}
{{- end }}
