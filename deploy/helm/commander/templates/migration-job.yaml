# =============================================================================
# Commander — Database Migration Job (Helm pre-install/pre-upgrade hook)
# =============================================================================
{{- if include "commander.postgresBackend" . }}
{{- include "commander.requireEnterpriseSecrets" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "commander.fullname" . }}-migration
  labels:
    {{- include "commander.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "commander.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: {{ .Values.migration.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "commander.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if include "commander.bundledPostgres" . }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.database.postgres.image.repository }}:{{ .Values.database.postgres.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "commander.fullname" . }}-postgres -p {{ .Values.database.postgres.port }} -U {{ .Values.database.postgres.user }}; do
                echo "Waiting for postgres..."
                sleep 2
              done
          securityContext:
            {{- include "commander.cellSecurityContext" . | nindent 12 }}
      {{- end }}
      containers:
        - name: migration
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - packages/kernel/dist/migrate.js
          env:
            - name: NODE_ENV
              value: {{ .Values.config.nodeEnv | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "commander.databaseUrlSecretName" . | quote }}
                  key: {{ include "commander.databaseUrlSecretKey" . | quote }}
          resources: {{ toYaml .Values.migration.resources | nindent 12 }}
          securityContext:
            {{- include "commander.cellSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
