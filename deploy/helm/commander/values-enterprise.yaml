# Enterprise cell profile — external Postgres + existingSecrets only.
tier: enterprise

# Explicit cell tenant for COMMANDER_CELL_TENANT_ID (must match an entry in worker.tenants).
cell:
  tenantId: tenant-a

web:
  enabled: false

worker:
  enabled: true
  replicas: 2
  authTokenSecret: cmdr-worker
  # REQUIRED: replace with this cell's explicit tenant IDs (never '*').
  tenants: tenant-a,tenant-b

kernelOps:
  enabled: true

adapterOps:
  enabled: true
  # Single replica until daemon ids are POD_NAME-suffixed (multi-replica stomps claims).
  replicas: 1
  secrets:
    existingSecret: cmdr-adapters

# Operator-supplied Ed25519 PEM + JWKS (existingSecret refs only; never chart-generated).
capability:
  existingSecret: cmdr-capability
  create: false

database:
  enabled: true
  backend: postgres
  postgres:
    bundled: false
    existingSecret: cmdr-db

networkPolicy:
  enabled: true
  egress:
    adapterCidrs: []
    databaseCidrs:
      - 10.0.0.0/32

sandboxd:
  enabled: false

persistence:
  enabled: false

api:
  secrets:
    existingSecret: cmdr-api
