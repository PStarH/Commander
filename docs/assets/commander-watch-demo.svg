<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="8"/>
  <rect x="12" y="12" width="776" height="28" rx="6" fill="#27272a"/>
  <circle cx="28" cy="26" r="5" fill="#ef4444"/>
  <circle cx="44" cy="26" r="5" fill="#eab308"/>
  <circle cx="60" cy="26" r="5" fill="#22c55e"/>
  <text x="400" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" fill="#a1a1aa" text-anchor="middle">commander watch</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">
    <text x="28" y="70" fill="#22c55e">$</text>
    <text x="44" y="70" fill="#e4e4e7">npx tsx packages/core/src/cli.ts run "audit this repo" --stream</text>

    <text x="28" y="105" fill="#71717a">[12:34:05]</text>
    <text x="100" y="105" fill="#a855f7">deliberation</text>
    <text x="190" y="105" fill="#d4d4d8">: classification=ANALYSIS complexity=7/10 topology=DISPATCH</text>

    <text x="28" y="130" fill="#71717a">[12:34:06]</text>
    <text x="100" y="130" fill="#3b82f6">agent α</text>
    <text x="154" y="130" fill="#d4d4d8">: scanning package.json for CVEs...</text>

    <text x="28" y="155" fill="#71717a">[12:34:07]</text>
    <text x="100" y="155" fill="#22c55e">tool</text>
    <text x="136" y="155" fill="#d4d4d8">: npm_audit · 2 critical, 5 moderate</text>

    <text x="28" y="180" fill="#71717a">[12:34:08]</text>
    <text x="100" y="180" fill="#f59e0b">gate</text>
    <text x="136" y="180" fill="#d4d4d8">: ACCURACY ✓ · COMPLETENESS ✓</text>

    <text x="28" y="205" fill="#71717a">[12:34:09]</text>
    <text x="100" y="205" fill="#3b82f6">agent β</text>
    <text x="154" y="205" fill="#d4d4d8">: checking for hardcoded secrets...</text>

    <text x="28" y="230" fill="#71717a">[12:34:10]</text>
    <text x="100" y="230" fill="#22c55e">tool</text>
    <text x="136" y="230" fill="#d4d4d8">: grep · 1 potential secret in config.ts</text>

    <text x="28" y="255" fill="#71717a">[12:34:11]</text>
    <text x="100" y="255" fill="#f59e0b">gate</text>
    <text x="136" y="255" fill="#d4d4d8">: SAFETY ⚠ · Potential secret detected</text>

    <text x="28" y="285" fill="#71717a">[12:34:12]</text>
    <text x="100" y="285" fill="#a855f7">synthesis</text>
    <text x="174" y="285" fill="#d4d4d8">: 4 findings, 2 critical</text>

    <text x="28" y="320" fill="#71717a">[12:34:13]</text>
    <text x="100" y="320" fill="#22c55e">done</text>
    <text x="138" y="320" fill="#d4d4d8">: report written to ./commander-report.md</text>
  </g>

  <text x="400" y="380" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#a1a1aa" text-anchor="middle">Commander CLI demo — deliberation, streaming agents, and quality gates</text>
</svg>
